<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .login-box {
    background: white;
    padding: 30px;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  .login-box h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  .input-box {
    margin-bottom: 15px;
  }

  .input-box label {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
  }

  .input-box input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  .input-box input:focus {
    border-color: #4facfe;
    outline: none;
  }

  .options {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 15px;
  }

  .options a {
    text-decoration: none;
    color: #4facfe;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #00c6ff;
  }

  .register {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
  }

  .register a {
    color: #4facfe;
    text-decoration: none;
  }

</style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <form>
      <div class="input-box">
        <label>Email</label>
        <input type="email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" required>
      </div>

    

      <button type="submit">Login</button>
    </form>

    <div class="register">
      Don't have an account? <a href="#">Register</a>
    </div>
  </div>

</body>
</html>
